set -g default-terminal "screen-256color"
set -sg escape-time 0
set-option -g allow-rename off
set -g mouse on
set-window-option -g mode-keys vi

# Set scrollback buffer to 10000
set -g history-limit 10000

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set -g prefix C-a


# Status bar
set -g status-style "bg=#F0EDEC,fg=#2C363C"
set -g status-position bottom
set -g status-justify centre
set -g status-right ""
set -g status-left "#[fg=#F0EDEC,bg=#286486] [#S] "
set -g status-left-length 50
set -g window-status-format " #I:#W "

# Selected window
set -g window-status-current-format "#[fg=#F0EDEC,bg=#4F6C31] #I:#W "

set -g pane-border-indicators "arrows"
set -g pane-border-lines "heavy"

# TODO(evgheni): add toggle for switching between light and dark

# Useful commands
unbind r
bind-key r source-file ~/.tmux.conf; display-message "Reloaded config"

# Use v to trigger selection
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Use y to yank current selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Tmux sessionizer
bind-key f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

bind-key \; last-window

# Pane navigation
bind-key h select-pane -L
bind-key l select-pane -R
bind-key j select-pane -D
bind-key k select-pane -U

set-option -g focus-events on
